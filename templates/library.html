<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Bibliothèque Manga</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style-library-search.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Navigation verticale -->
        <div class="sidebar-nav">
            <a href="/" class="nav-link">📚 Bibliothèques</a>
            <a href="/import" class="nav-link">📥 Import</a>
            <a href="/discover" class="nav-link">🎯 Découvrir</a>
            <a href="/search" class="nav-link">🔍 Recherche</a>
            <a href="/transfer" class="nav-link">↔️ Transfer</a>
            <a href="/nautiljon" class="nav-link">🌊 Nautiljon</a>
            <a href="/missing-monitor" class="nav-link">📊 Surveillance</a>
            <a href="/settings" class="nav-link">⚙️ Configuration</a>
        </div>

        <div class="main-wrapper">
            <header>
                <div class="header-content">
                    <div class="header-left">
                        <h1 id="library-title">📚 Bibliothèque</h1>
                        <p class="subtitle" id="library-path">Chargement...</p>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="content">
            <div class="controls">
                <button class="btn" onclick="scanLibrary()">🔄 Scanner</button>
                <button class="btn" onclick="enrichAllSeries()" style="background: #10b981;">✨ Enrichir</button>
                <button class="btn" onclick="loadLibraryData()">📖 Recharger les données</button>
                <button class="btn" id="filter-status-btn" onclick="toggleStatusFilter()">📚 Toutes les séries</button>
                <button class="btn" id="filter-btn" onclick="toggleMissingFilter()">⚠️ Volumes manquants uniquement</button>
                <button class="btn" id="filter-unenriched-btn" onclick="toggleUnenrichedFilter()">🔍 Séries non enrichies</button>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Séries</div>
                    <div class="stat-value" id="series-count">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Volumes</div>
                    <div class="stat-value" id="volumes-count">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Taille totale</div>
                    <div class="stat-value" id="total-size">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pages moyennes</div>
                    <div class="stat-value" id="avg-pages">-</div>
                </div>
            </div>

            <input type="text" class="search-box" id="search" 
                   placeholder="🔍 Rechercher une série..." 
                   onkeyup="filterSeries()">

            <div class="series-grid" id="series-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement des données...</p>
                </div>
            </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="series-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Modal de recherche ED2K -->
    <div class="modal" id="search-ed2k-modal">
        <div class="modal-content" style="max-width: 900px;">
            <span class="close-modal" onclick="closeSearchModal()">×</span>
            <div id="search-modal-body"></div>
        </div>
    </div>

   <script>
        const libraryId = {{ library_id }};
   </script>
    <script src="{{ url_for('static', filename='js/nautiljon.js') }}"></script>
    <script src="{{ url_for('static', filename='js/library.js') }}"></script>
    <script src="{{ url_for('static', filename='js/nav.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    <script>
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAuthSystem);
        } else {
            initAuthSystem();
        }
    </script>
</body>
</html>
